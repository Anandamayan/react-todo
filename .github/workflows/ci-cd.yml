name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    # Backend install
    - name: Install backend dependencies
      run: |
        cd server
        npm install

    # Frontend install + build
    - name: Build frontend
      run: |
        cd client
        npm install
        npm run build

    # Docker build
    - name: Build Docker containers
      run: docker-compose build